# =============================================================================
# Arborisis — Docker Compose Development
# =============================================================================
# Usage : docker compose -f docker-compose.dev.yml up -d
# Hot-reload Vite + Xdebug + volumes montés
# =============================================================================

name: arborisis-dev

services:
  # ---------------------------------------------------------------------------
  # App Laravel (Dev)
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: dev
    container_name: arborisis-dev-app
    restart: "no"
    env_file:
      - .env
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SESSION_DRIVER: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      BROADCAST_CONNECTION: reverb
      LOG_CHANNEL: stack
    volumes:
      - ./arborisis:/var/www/html:cached
      - vendor-dev:/var/www/html/vendor
      - node_modules-dev:/var/www/html/node_modules
      - app-storage-dev:/var/www/html/storage
    networks:
      - arborisis-dev
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "9003:9003"  # Xdebug

  # ---------------------------------------------------------------------------
  # Vite Dev Server (Hot Reload)
  # ---------------------------------------------------------------------------
  vite:
    image: node:22-alpine
    container_name: arborisis-dev-vite
    restart: "no"
    working_dir: /var/www/html
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    env_file:
      - .env
    environment:
      VITE_APP_NAME: Arborisis
    volumes:
      - ./arborisis:/var/www/html:cached
      - node_modules-dev:/var/www/html/node_modules
      - vendor-dev:/var/www/html/vendor
    networks:
      - arborisis-dev
    ports:
      - "5173:5173"
    depends_on:
      - app

  # ---------------------------------------------------------------------------
  # Nginx (Dev)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: arborisis-dev-nginx
    restart: "no"
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./arborisis/public:/var/www/html/public:cached
      - app-storage-dev:/var/www/html/storage
    networks:
      - arborisis-dev
    depends_on:
      - app
      - vite

  # ---------------------------------------------------------------------------
  # PostgreSQL + PostGIS (Dev)
  # ---------------------------------------------------------------------------
  db:
    image: postgis/postgis:16-3.4-alpine
    container_name: arborisis-dev-db
    restart: "no"
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_DATABASE:-arborisis_dev}
      POSTGRES_USER: ${DB_USERNAME:-arborisis}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data-dev:/var/lib/postgresql/data
    networks:
      - arborisis-dev
    ports:
      - "${DB_PORT:-54322}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-arborisis} -d ${DB_DATABASE:-arborisis_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis (Dev)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: arborisis-dev-redis
    restart: "no"
    command: redis-server --appendonly yes
    volumes:
      - redis-data-dev:/data
    networks:
      - arborisis-dev
    ports:
      - "${REDIS_PORT:-63790}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Queue Worker (Dev)
  # ---------------------------------------------------------------------------
  queue:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: dev
    container_name: arborisis-dev-queue
    restart: "no"
    env_file:
      - .env
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_HOST: db
      REDIS_HOST: redis
      SESSION_DRIVER: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      LOG_CHANNEL: stack
    volumes:
      - ./arborisis:/var/www/html:cached
      - vendor-dev:/var/www/html/vendor
      - node_modules-dev:/var/www/html/node_modules
      - app-storage-dev:/var/www/html/storage
    networks:
      - arborisis-dev
    depends_on:
      - app
      - db
      - redis
    command: ["php", "artisan", "queue:work", "--tries=1", "--timeout=0"]

  # ---------------------------------------------------------------------------
  # Scheduler (Dev)
  # ---------------------------------------------------------------------------
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: dev
    container_name: arborisis-dev-scheduler
    restart: "no"
    env_file:
      - .env
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_HOST: db
      REDIS_HOST: redis
      SESSION_DRIVER: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      LOG_CHANNEL: stack
    volumes:
      - ./arborisis:/var/www/html:cached
      - vendor-dev:/var/www/html/vendor
      - node_modules-dev:/var/www/html/node_modules
      - app-storage-dev:/var/www/html/storage
    networks:
      - arborisis-dev
    depends_on:
      - app
      - db
      - redis
    command: ["sh", "-c", "while true; do php artisan schedule:run --ansi; sleep 60; done"]

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres-data-dev:
    driver: local
  redis-data-dev:
    driver: local
  app-storage-dev:
    driver: local
  vendor-dev:
    driver: local
  node_modules-dev:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  arborisis-dev:
    driver: bridge
    ipam:
      config:
        - subnet: 172.29.0.0/16
