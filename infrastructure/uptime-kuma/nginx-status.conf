# Reverse proxy Nginx pour status.arborisis.com → Uptime Kuma
# Placer ce fichier dans /etc/nginx/sites-available/status.arborisis.com
# puis : sudo ln -s /etc/nginx/sites-available/status.arborisis.com /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name status.arborisis.com;

    # Redirection HTTPS (décommenter si certificat SSL configuré)
    # return 301 https://$server_name$request_uri;

    # Si HTTPS activé, garder ce bloc à la place :
    # listen 443 ssl http2;
    # listen [::]:443 ssl http2;
    # ssl_certificate /etc/letsencrypt/live/status.arborisis.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/status.arborisis.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Timeouts généreux pour les websockets de Uptime Kuma
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Sécurité de base
    location ~ /\. {
        deny all;
    }
}
