services:
  icecast:
    image: moul/icecast
    container_name: <redacted>-icecast
    restart: unless-stopped
    ports:
      - "${ICECAST_BIND:-127.0.0.1}:${ICECAST_PUBLIC_PORT:-8010}:8000"
    environment:
      ICECAST_SOURCE_PASSWORD: ${ICECAST_SOURCE_PASSWORD}
      ICECAST_ADMIN_PASSWORD: ${ICECAST_ADMIN_PASSWORD}
      ICECAST_RELAY_PASSWORD: ${ICECAST_RELAY_PASSWORD:-relay}
      ICECAST_HOSTNAME: ${ICECAST_HOSTNAME:-localhost}
      ICECAST_LOCATION: ${ICECAST_LOCATION:-Arborisis}
      ICECAST_ADMIN: ${ICECAST_ADMIN_EMAIL:-contact@<redacted>.com}

  liquidsoap:
    image: savonet/liquidsoap:v2.2.5
    container_name: <redacted>-liquidsoap
    restart: unless-stopped
    depends_on:
      - icecast
    volumes:
      - ./liquidsoap:/radio:ro
      - ../../<redacted>/storage/app/radio-cache:/radio-cache:ro
      - liquidsoap-cache:/tmp/<redacted>-radio
    environment:
      LARAVEL_BASE_URL: ${LARAVEL_BASE_URL:-http://host.docker.internal}
      RADIO_INTERNAL_TOKEN: ${RADIO_INTERNAL_TOKEN}
      ICECAST_HOST: ${ICECAST_HOST:-icecast}
      ICECAST_PORT: ${ICECAST_PORT:-8000}
      ICECAST_SOURCE_PASSWORD: ${ICECAST_SOURCE_PASSWORD}
      ICECAST_MOUNT: ${ICECAST_MOUNT:-/<redacted>.mp3}
      RADIO_CROSSFADE_SECONDS: ${RADIO_CROSSFADE_SECONDS:-4}
    extra_hosts:
      - "<redacted>.com:172.19.0.1"
    command: ["liquidsoap", "/radio/<redacted>.liq"]

volumes:
  liquidsoap-cache:
