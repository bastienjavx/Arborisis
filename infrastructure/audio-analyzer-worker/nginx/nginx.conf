upstream analyzer_backend {
    # least_conn = envoie vers l'instance avec le moins de connexions actives
    # Meilleur choix que round-robin car les analyses BirdNET ont des durées variables
    least_conn;

    server analyzer-1:8000 max_fails=3 fail_timeout=10s;
    server analyzer-2:8000 max_fails=3 fail_timeout=10s;
    server analyzer-3:8000 max_fails=3 fail_timeout=10s;
}

server {
    listen 80;
    server_name _;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Healthcheck — rapide, utilisé par monitoring externe
    location /health {
        proxy_pass http://analyzer_backend/health;
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }

    # Endpoint d'analyse — temps d'exécution long possible (BirdNET + spectrogramme)
    location /analyze {
        proxy_pass http://analyzer_backend/analyze;
        proxy_http_version 1.1;

        # Timeouts généreux car une analyse peut prendre jusqu'à 5 min (BirdNET timeout)
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 300s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Content-Type $http_content_type;

        # Désactiver le buffering pour les réponses 202 Accepted rapides
        proxy_buffering off;
    }

    location / {
        return 404;
    }
}
