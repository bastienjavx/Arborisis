name: <redacted>

services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    profiles: ["web"]
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - public-data:/var/www/html/public:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/cloudflare-real-ip.conf:/etc/nginx/conf.d/cloudflare-real-ip.conf:ro
    depends_on:
      app:
        condition: service_started
      reverb:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - public
      - app

  app:
    build:
      context: ../../<redacted>
      dockerfile: Dockerfile
    image: <redacted>/laravel:${ARBORISIS_IMAGE_TAG:-local}
    restart: unless-stopped
    profiles: ["web"]
    env_file:
      - ${ARBORISIS_APP_ENV_FILE:-../../<redacted>/.env}
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      CACHE_STORE: ${CACHE_STORE:-redis}
      SESSION_DRIVER: ${SESSION_DRIVER:-redis}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      INERTIA_SSR_URL: ${INERTIA_SSR_URL:-http://ssr:13714}
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 8080
    volumes:
      - app-storage:/var/www/html/storage
      - app-cache:/var/www/html/bootstrap/cache
      - public-data:/var/www/html/public
    healthcheck:
      test: ["CMD-SHELL", "php -r 'exit(extension_loaded(\"pdo_pgsql\") && extension_loaded(\"redis\") ? 0 : 1);'"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - app
      - data

  ssr:
    image: <redacted>/laravel:${ARBORISIS_IMAGE_TAG:-local}
    restart: unless-stopped
    profiles: ["web"]
    command: php artisan inertia:start-ssr
    env_file:
      - ${ARBORISIS_APP_ENV_FILE:-../../<redacted>/.env}
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      INERTIA_SSR_ENABLED: ${INERTIA_SSR_ENABLED:-true}
    volumes:
      - app-cache:/var/www/html/bootstrap/cache
    depends_on:
      app:
        condition: service_started
    networks:
      - app

  queue:
    image: <redacted>/laravel:${ARBORISIS_IMAGE_TAG:-local}
    restart: unless-stopped
    profiles: ["workers"]
    command: php artisan queue:work redis --queue=high,default,discord,low --sleep=1 --tries=3 --timeout=360
    env_file:
      - ${ARBORISIS_APP_ENV_FILE:-../../<redacted>/.env}
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: ${DB_HOST:-postgres}
      CACHE_STORE: ${CACHE_STORE:-redis}
      SESSION_DRIVER: ${SESSION_DRIVER:-redis}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      REDIS_HOST: ${REDIS_HOST:-redis}
      INERTIA_SSR_URL: ${INERTIA_SSR_URL:-http://ssr:13714}
    volumes:
      - app-storage:/var/www/html/storage
      - app-cache:/var/www/html/bootstrap/cache
      - public-data:/var/www/html/public
    networks:
      - data

  scheduler:
    image: <redacted>/laravel:${ARBORISIS_IMAGE_TAG:-local}
    restart: unless-stopped
    profiles: ["workers"]
    command: sh -c 'while true; do php artisan schedule:run --no-interaction; sleep 60; done'
    env_file:
      - ${ARBORISIS_APP_ENV_FILE:-../../<redacted>/.env}
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: ${DB_HOST:-postgres}
      CACHE_STORE: ${CACHE_STORE:-redis}
      SESSION_DRIVER: ${SESSION_DRIVER:-redis}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      REDIS_HOST: ${REDIS_HOST:-redis}
      INERTIA_SSR_URL: ${INERTIA_SSR_URL:-http://ssr:13714}
    volumes:
      - app-storage:/var/www/html/storage
      - app-cache:/var/www/html/bootstrap/cache
      - public-data:/var/www/html/public
    depends_on:
      - app
    networks:
      - data

  reverb:
    image: <redacted>/laravel:${ARBORISIS_IMAGE_TAG:-local}
    restart: unless-stopped
    profiles: ["web"]
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    env_file:
      - ${ARBORISIS_APP_ENV_FILE:-../../<redacted>/.env}
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: ${DB_HOST:-postgres}
      CACHE_STORE: ${CACHE_STORE:-redis}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      REDIS_HOST: ${REDIS_HOST:-redis}
      INERTIA_SSR_URL: ${INERTIA_SSR_URL:-http://ssr:13714}
      REVERB_SCALING_ENABLED: ${REVERB_SCALING_ENABLED:-true}
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 8080
    volumes:
      - app-storage:/var/www/html/storage
      - app-cache:/var/www/html/bootstrap/cache
      - public-data:/var/www/html/public
    depends_on:
      app:
        condition: service_started
    networks:
      - app
      - data

  discord-bot:
    build:
      context: ../../<redacted>/discord-bot
      dockerfile: Dockerfile
    image: <redacted>/discord-bot:${ARBORISIS_IMAGE_TAG:-local}
    restart: unless-stopped
    profiles: ["workers"]
    env_file:
      - ${ARBORISIS_DISCORD_ENV_FILE:-../../<redacted>/discord-bot/.env}
    environment:
      DISCORD_BOT_HOST: 0.0.0.0
      DISCORD_BOT_PORT: 3001
    ports:
      - "${DISCORD_BOT_PORT:-3001}:3001"
    networks:
      - app

  cloudflared:
    image: ${CLOUDFLARED_IMAGE:-cloudflare/cloudflared:latest}
    restart: unless-stopped
    profiles: ["tunnel"]
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:-missing}
    depends_on:
      nginx:
        condition: service_started
    networks:
      - public

  postgres:
    image: postgis/postgis:17-3.5-alpine
    restart: unless-stopped
    profiles: ["data"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-<redacted>}
      POSTGRES_USER: ${POSTGRES_USER:-<redacted>}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "${POSTGRES_BIND_ADDR:-127.0.0.1}:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-<redacted>} -d ${POSTGRES_DB:-<redacted>}"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - data

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    profiles: ["data"]
    command: redis-server --appendonly yes --maxmemory ${REDIS_MAXMEMORY:-512mb} --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_BIND_ADDR:-127.0.0.1}:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - data

networks:
  public:
  app:
  data:

volumes:
  app-storage:
  app-cache:
  public-data:
  postgres-data:
  redis-data:
