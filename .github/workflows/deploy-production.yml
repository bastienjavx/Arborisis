name: Deploy production

on:
  workflow_dispatch:
    inputs:
      action:
        description: Deploy a new release or rollback to a previous release
        required: true
        default: deploy
        type: choice
        options:
          - deploy
          - rollback
      rollback_release:
        description: Optional release directory name for rollback. Empty means previous release.
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: production
  cancel-in-progress: false

env:
  APP_DIR: arborisis
  NODE_VERSION: "22"

jobs:
  deploy:
    name: Deploy production release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event.inputs.action == 'deploy'
    environment:
      name: production
      url: ${{ secrets.APP_URL }}

    steps:
      - name: Refuse non-main deployments
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "Production deploys are allowed only from main."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: arborisis/package-lock.json

      - name: Build frontend assets
        working-directory: ${{ env.APP_DIR }}
        run: |
          npm ci
          npm run build

      - name: Prepare SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -euo pipefail
          test -n "$SSH_PRIVATE_KEY"
          test -n "$SSH_HOST"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${SSH_PORT:-22}" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Put current release in maintenance
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          test -n "$SSH_USER"
          test -n "$DEPLOY_PATH"
          ssh -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" 'sh -s' -- "$DEPLOY_PATH" <<'REMOTE'
          set -eu
          deploy_path="${1:?DEPLOY_PATH missing}"
          current="${deploy_path%/}/current"
          if [ -d "$current" ]; then
            cd "$current"
            php artisan down --retry=60
          fi
          REMOTE

      - name: Deploy release
        env:
          DEPLOY_HOST: ${{ secrets.SSH_HOST }}
          DEPLOY_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          APP_URL: ${{ secrets.APP_URL }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          CI_COMMIT_REF_SLUG: main
          CI_COMMIT_SHORT_SHA: ${{ github.sha }}
          CI_PIPELINE_ID: ${{ github.run_id }}
          DEPLOY_KEEP_RELEASES: "5"
          RUN_MIGRATIONS: "true"
          RUN_QUEUE_RESTART: "true"
        run: |
          set -euo pipefail
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_PATH"
          test -n "$SSH_PRIVATE_KEY"
          sh .gitlab/deploy/deploy.sh

      - name: Bring application back up
        if: always()
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          test -n "$SSH_USER"
          test -n "$DEPLOY_PATH"
          ssh -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" 'sh -s' -- "$DEPLOY_PATH" <<'REMOTE'
          set -eu
          deploy_path="${1:?DEPLOY_PATH missing}"
          current="${deploy_path%/}/current"
          if [ -d "$current" ]; then
            cd "$current"
            php artisan up
          fi
          REMOTE

  rollback:
    name: Rollback production release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event.inputs.action == 'rollback'
    environment:
      name: production
      url: ${{ secrets.APP_URL }}

    steps:
      - name: Refuse non-main rollbacks
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "Production rollback is allowed only from main."
            exit 1
          fi

      - name: Prepare SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -euo pipefail
          test -n "$SSH_PRIVATE_KEY"
          test -n "$SSH_HOST"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${SSH_PORT:-22}" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Rollback symlink
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          ROLLBACK_RELEASE: ${{ github.event.inputs.rollback_release }}
        run: |
          set -euo pipefail
          test -n "$SSH_USER"
          test -n "$DEPLOY_PATH"
          ssh -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" 'sh -s' -- "$DEPLOY_PATH" "$ROLLBACK_RELEASE" <<'REMOTE'
          set -eu
          deploy_path="${1:?DEPLOY_PATH missing}"
          requested="${2:-}"
          releases="${deploy_path%/}/releases"
          current="${deploy_path%/}/current"

          if [ -n "$requested" ]; then
            target="$releases/$requested"
          else
            target="$(ls -dt "$releases"/* | sed -n '2p')"
          fi

          if [ -z "$target" ] || [ ! -d "$target" ]; then
            echo "Rollback target not found."
            exit 1
          fi

          if [ -d "$current" ]; then
            cd "$current"
            php artisan down --retry=60
          fi

          ln -sfn "$target" "${current}.next"
          if mv -Tf "${current}.next" "$current" 2>/dev/null; then
            :
          else
            rm -f "$current"
            ln -s "$target" "$current"
          fi

          cd "$current"
          php artisan optimize:clear
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          php artisan event:cache
          php artisan queue:restart
          php artisan up
          REMOTE
