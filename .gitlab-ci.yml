# GitLab CI/CD — Déploiement automatique Arborisis
# Workflow : push sur main → build → déploiement SSH sur le serveur de production

stages:
  - deploy

variables:
  DEPLOY_HOST: "213.199.53.8"
  DEPLOY_USER: "root"
  DEPLOY_PATH: "/var/www/<redacted>"
  GIT_DEPTH: 0

deploy_production:
  stage: deploy
  image: node:22-alpine
  only:
    - main
  before_script:
    # Installer les outils nécessaires
    - apk add --no-cache openssh-client git
    # Configurer la clé SSH (décodée depuis base64 pour préserver le format)
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$SSH_PRIVATE_KEY_BASE64" | base64 -d > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts 2>/dev/null || true
  script:
    - echo "🚀 Déploiement sur $DEPLOY_HOST..."
    # Pull du code sur le serveur
    - |
      ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 $DEPLOY_USER@$DEPLOY_HOST "
        cd $DEPLOY_PATH && \
        git config --global --add safe.directory $DEPLOY_PATH && \
        git fetch origin main && \
        git reset --hard origin/main && \
        echo '✅ Code mis à jour'
      "
    # Synchroniser <redacted>/ vers la racine (nginx sert la racine, pas le sous-dossier)
    - |
      ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 $DEPLOY_USER@$DEPLOY_HOST "
        cd $DEPLOY_PATH && \
        rsync -av --delete \
          --exclude='.env' \
          --exclude='storage/' \
          --exclude='.git/' \
          --exclude='node_modules/' \
          --exclude='vendor/' \
          <redacted>/ ./ ; \
        RC=\$? ; \
        if [ \$RC -eq 0 ] || [ \$RC -eq 24 ]; then \
          echo '✅ Code synchronisé vers la racine' ; \
        else \
          exit \$RC ; \
        fi
      "
    # Install + build des assets frontend
    - |
      ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 $DEPLOY_USER@$DEPLOY_HOST "
        su - <redacted> -s /bin/bash -c 'cd $DEPLOY_PATH && npm ci 2>&1' && \
        su - <redacted> -s /bin/bash -c 'cd $DEPLOY_PATH && npm run build 2>&1' && \
        echo '✅ Build terminé'
      "
    # Nettoyage + optimisations Laravel
    - |
      ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 $DEPLOY_USER@$DEPLOY_HOST "
        cd $DEPLOY_PATH && \
        php artisan view:clear 2>&1 && \
        php artisan config:cache 2>&1 && \
        php artisan route:cache 2>&1 && \
        php artisan event:cache 2>&1 && \
        echo '✅ Cache Laravel rafraîchi'
      "
    - echo "🎉 Déploiement terminé avec succès !"
