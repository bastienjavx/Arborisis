# =============================================================================
# Arborisis — Docker Compose Production
# =============================================================================
# Usage : docker compose -f docker-compose.yml up -d
# =============================================================================

name: arborisis

services:
  # ---------------------------------------------------------------------------
  # App Laravel (PHP-FPM)
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: ghcr.io/bastienjavx/arborisis-app:latest
    container_name: arborisis-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SESSION_DRIVER: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      BROADCAST_CONNECTION: reverb
      LOG_CHANNEL: stderr
    volumes:
      - app-storage:/var/www/html/storage
      - app-logs:/var/www/html/storage/logs
    networks:
      - arborisis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Nginx Reverse Proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: arborisis-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - app-storage:/var/www/html/storage
    networks:
      - arborisis
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # PostgreSQL + PostGIS
  # ---------------------------------------------------------------------------
  db:
    image: postgis/postgis:16-3.4-alpine
    container_name: arborisis-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_DATABASE:-arborisis}
      POSTGRES_USER: ${DB_USERNAME:-arborisis}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - arborisis
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-arborisis} -d ${DB_DATABASE:-arborisis}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis (Cache, Sessions, Queues)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: arborisis-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - arborisis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Queue Worker Laravel
  # ---------------------------------------------------------------------------
  queue:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: ghcr.io/bastienjavx/arborisis-app:latest
    container_name: arborisis-queue
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_HOST: db
      REDIS_HOST: redis
      SESSION_DRIVER: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      LOG_CHANNEL: stderr
      CONTAINER_SKIP_OPTIMIZE: "true"
      CONTAINER_STORAGE_LINK: "false"
    volumes:
      - app-storage:/var/www/html/storage
      - app-logs:/var/www/html/storage/logs
    networks:
      - arborisis
    depends_on:
      - app
      - db
      - redis
    command: ["/usr/local/bin/arborisis-entrypoint-queue"]
    deploy:
      replicas: 1

  # ---------------------------------------------------------------------------
  # Laravel Scheduler (Cron)
  # ---------------------------------------------------------------------------
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: ghcr.io/bastienjavx/arborisis-app:latest
    container_name: arborisis-scheduler
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_HOST: db
      REDIS_HOST: redis
      SESSION_DRIVER: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      LOG_CHANNEL: stderr
      CONTAINER_SKIP_OPTIMIZE: "true"
      CONTAINER_STORAGE_LINK: "false"
    volumes:
      - app-storage:/var/www/html/storage
      - app-logs:/var/www/html/storage/logs
      - scheduler-logs:/var/log
    networks:
      - arborisis
    depends_on:
      - app
      - db
      - redis
    command: ["/usr/local/bin/arborisis-entrypoint-scheduler"]

  # ---------------------------------------------------------------------------
  # Discord Bot
  # ---------------------------------------------------------------------------
  discord-bot:
    build:
      context: ./discord-bot
      dockerfile: Dockerfile
    image: ghcr.io/bastienjavx/arborisis-discord-bot:latest
    container_name: arborisis-discord-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
    networks:
      - arborisis
    depends_on:
      - app

  # ---------------------------------------------------------------------------
  # Python Audio Analysis Service
  # ---------------------------------------------------------------------------
  python-analyzer:
    build:
      context: ./services/python-analysis
      dockerfile: Dockerfile
    image: ghcr.io/bastienjavx/arborisis-python-analyzer:latest
    container_name: arborisis-python-analyzer
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - app-storage:/var/www/html/storage
    networks:
      - arborisis
    depends_on:
      - app
      - db

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  app-storage:
    driver: local
  app-logs:
    driver: local
  scheduler-logs:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  arborisis:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
